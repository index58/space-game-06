<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Основной корпус корабля -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a6e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a9e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2a4e;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Левое крыло -->
  <polygon points="8,36 16,52 16,48 10,40" fill="#2d5a9e"/>
  <!-- Правое крыло -->
  <polygon points="56,36 48,52 48,48 54,40" fill="#2d5a9e"/>
  
  <!-- Основной корпус (треугольник) -->
  <polygon points="32,4 16,56 48,56" fill="url(#bodyGrad)"/>
  
  <!-- Нос корабля -->
  <polygon points="32,4 28,20 36,20" fill="#6ab0ff"/>
  
  <!-- Кабина пилота -->
  <ellipse cx="32" cy="28" rx="4" ry="6" fill="#a0d0ff"/>
  
  <!-- Двигатели -->
  <polygon points="16,56 12,60 20,60" fill="#ff6600"/>
  <polygon points="48,56 44,60 52,60" fill="#ff6600"/>
  
  <!-- Детали корпуса -->
  <line x1="32" y1="4" x2="32" y2="56" stroke="#1a3a6e" stroke-width="0.5"/>
  <line x1="16" y1="56" x2="32" y2="28" stroke="#1a3a6e" stroke-width="0.5"/>
  <line x1="48" y1="56" x2="32" y2="28" stroke="#1a3a6e" stroke-width="0.5"/>
</svg>
